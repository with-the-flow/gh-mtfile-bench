name: Multi-thread File Operation Benchmark

on:
  workflow_dispatch:
  push:
    paths:
      - 'benchmark.py'
      - 'generate_report.py'
      - '.github/workflows/multithread-benchmark.yml'

# env 必须放在 jobs 外面、on 下面，不能嵌套在 job 里
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  benchmark-ubuntu:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install 7-Zip
        run: sudo apt-get update && sudo apt-get install -y p7zip-full p7zip-rar
      - name: Run Benchmark
        run: python benchmark.py
      - name: Upload Results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-ubuntu
          path: results/

  benchmark-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install 7-Zip
        shell: pwsh
        run: |
          $url = "https://www.7-zip.org/a/7z2409-x64.exe"
          $output = "$env:TEMP\7z.exe"
          Invoke-WebRequest -Uri $url -OutFile $output
          Start-Process -FilePath $output -ArgumentList "/S /D=C:\Program Files\7-Zip" -Wait
          echo "C:\Program Files\7-Zip" | Out-File -FilePath $env:GITHUB_PATH -Append
      - name: Verify 7-Zip
        shell: pwsh
        run: 7z i | Select-Object -First 3
      - name: Run Benchmark
        run: python benchmark.py
      - name: Upload Results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-windows
          path: results/

  benchmark-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install 7-Zip
        run: |
          brew install p7zip || echo "p7zip already installed or skipped"
      - name: Verify 7-Zip
        run: 7z i | head -3
      - name: Run Benchmark
        run: python benchmark.py
      - name: Upload Results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-macos
          path: results/

  generate-report:
    needs: [benchmark-ubuntu, benchmark-windows, benchmark-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          pattern: benchmark-*
      - name: Merge and Generate Report
        run: |
          mkdir -p final-report
          python generate_report.py
      - name: Upload Final Report
        uses: actions/upload-artifact@v4
        with:
          name: final-analysis-report
          path: final-report/